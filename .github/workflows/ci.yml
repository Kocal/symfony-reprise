name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same ref (branch/PR) when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: [lts/*]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test

  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        symfony: ['7.4.*', '8.0.*']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - name: Validate composer.json
        run: composer validate --strict
      # Pin every Symfony require-dev package to the matrix version so the matrix genuinely
      # exercises 7.4 and 8.0 (the composer update below then resolves against these floors).
      - name: Restrict Symfony version
        run: composer require --no-update --dev "symfony/framework-bundle:${{ matrix.symfony }}" "symfony/http-kernel:${{ matrix.symfony }}" "symfony/filesystem:${{ matrix.symfony }}"
      - name: Install
        run: composer update --prefer-dist --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  php-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - name: Install
        run: composer install --prefer-dist --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse
      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
